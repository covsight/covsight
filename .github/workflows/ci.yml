name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ivpm and fetch dependencies
        run: pip install ivpm && ivpm update

      - name: Install covsight-core
        run: pip install -e "packages/covsight-core[validate,hjson]"

      - name: Install covsight
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest
