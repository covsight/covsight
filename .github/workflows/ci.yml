name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ivpm and fetch dependencies
        run: pip install ivpm && ivpm update

      - name: Install covsight-core
        run: pip install -e "packages/covsight-core[validate,hjson]"

      - name: Install covsight
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest
